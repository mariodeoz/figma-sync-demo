name: "Design Sync (Figma Continuous Design)"

on:
  workflow_dispatch:  # Ejecución manual (recomendada para control)
  push:
    branches:
      - main
    paths:
      - 'css/tokens.json'  # Si se sincroniza por commit

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Figma Plugin CLI
        run: npm install -g @mikaelvesavuori/figma-plugin-continuous-design

      - name: Sync Tokens from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_PAT }}
          FIGMA_FILE_ID: ${{ secrets.FIGMA_FILE_ID }}
        run: |
          continuous-design \
            --token $FIGMA_TOKEN \
            --fileId $FIGMA_FILE_ID \
            --output ./css/tokens.json \
            --type tokens

      - name: Transform JSON to CSS
        run: |
          node -e "
            const fs = require('fs');
            try {
              const tokens = JSON.parse(fs.readFileSync('./css/tokens.json', 'utf8'));
              let css = '/* ── Design tokens (Autogenerated from Figma) ──────────────────────── */\n:root {\n';
              
              // Recorrer el JSON y limpiar nombres para variables CSS
              Object.entries(tokens).forEach(([key, data]) => {
                // Soporta formato simple { key: { value: '#000' } }
                const value = data.value || data;
                const cleanKey = key.replace(/[\s/]+/g, '-').toLowerCase();
                css += '  --' + cleanKey + ': ' + value + ';\n';
              });
              
              css += '}\n';
              fs.writeFileSync('./css/tokens.css', css);
              console.log('CSS generado con éxito.');
            } catch (e) {
              console.error('Error transformando tokens:', e.message);
              process.exit(1);
            }
          "

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: sync design tokens from figma [skip ci]"
          file_pattern: 'css/tokens.*'
