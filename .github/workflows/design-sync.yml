name: "Design: Sync Figma Tokens & Assets"

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Descripción del cambio de diseño (enviada por el plugin de Figma)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download tokens from Figma API
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_PAT }}
          FIGMA_FILE_ID: ${{ secrets.FIGMA_FILE_ID }}
        run: |
          curl -sf \
            -H "X-Figma-Token: $FIGMA_TOKEN" \
            "https://api.figma.com/v1/files/$FIGMA_FILE_ID/variables/local" \
            -o ./src/public/css/tokens.json

      - name: Transform JSON to CSS Variables
        run: |
          # Script simple para convertir el JSON de Figma a CSS
          node -e "
            const fs = require('fs');
            const tokens = JSON.parse(fs.readFileSync('./src/public/css/tokens.json', 'utf8'));
            let css = ':root {\n';
            // Lógica para transformar tokens a variables CSS
            Object.entries(tokens).forEach(([key, val]) => {
              css += '  --' + key.replace(/\s+/g, '-').toLowerCase() + ': ' + val.value + ';\n';
            });
            css += '}\n';
            fs.writeFileSync('./src/public/css/tokens.css', css);
          "

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: sync design tokens from figma [skip ci]"
          file_pattern: 'src/public/css/tokens.*'